# Dependency-vulnerability audit. Runs on every push to the main
# branches and on every pull request. High-severity advisories fail
# the job; lower severities are surfaced in the log without blocking.
#
# `cargo audit` requires the `Cargo.lock` checked in (it is, under
# `wasm-engine/`). `npm audit` reads `package-lock.json` at the repo
# root.

name: audit

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: npm audit (production deps, high+ blocks)
        run: npm audit --omit=dev --audit-level=high
      - name: npm audit (full report, advisory only)
        if: always()
        run: npm audit || true

  cargo-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wasm-engine
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit
